<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball - Finales CACM 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: url('img/fondo.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: rgba(0, 0, 0, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; padding: 25px; margin: 20px auto; max-width: 800px; color: white; }
        
        .match-card { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 20px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.1); }
        .etiqueta-partido { font-weight: 900; color: #ff9800; font-size: 1.3rem; margin-bottom: 5px; text-transform: uppercase; }
        
        .team-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; cursor: zoom-in; border: 3px solid white; transition: 0.3s; }
        .vs-text { font-size: 2rem; font-weight: 900; color: white; margin: 10px 0; }
        
        .modal-body img { border-radius: 15px; width: 100%; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container"><a class="navbar-brand" href="index.html">⬅ VOLVER AL INICIO</a></div>
</nav>

<div class="container text-center">
    <div class="glass-panel">
        <h1 class="mb-4 fw-bold">🏀 FINALES DE BASKETBALL</h1>
        <div id="content-area"></div>
    </div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body"><img id="modalImage" src="" alt="Equipo"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Solo edita esta lista de partidos
    const partidos = [
        { fase: "Tercer Lugar", fecha: "MIERCOLES 24", hora: "10:00", t1: "ALFA METRITOS", img1: "img/alfa.jpg", t2: "N S J", img2: "img/nsj.jpg" },
        { fase: "Gran Final", fecha: "VIERNES 26", hora: "10:00", t1: "MASTERS MIX", img1: "img/mastermix.jpg", t2: "METRITOS SPACE JAM", img2: "img/metritos.jpg" }
    ];

    function showImage(src) {
        document.getElementById('modalImage').src = src;
        new bootstrap.Modal(document.getElementById('imageModal')).show();
    }

    let html = '';
    partidos.forEach(p => {
        html += `
        <div class="match-card">
            <div class="etiqueta-partido">${p.fase}</div>
            <div class="fw-bold mb-3">🕒 ${p.fecha} - ${p.hora}</div>
            <div class="row align-items-center">
                <div class="col-5" onclick="showImage('${p.img1}')">
                    <img src="${p.img1}" class="team-img"><p class="fw-bold mt-2 mb-0">${p.t1}</p>
                </div>
                <div class="col-2 vs-text">VS</div>
                <div class="col-5" onclick="showImage('${p.img2}')">
                    <img src="${p.img2}" class="team-img"><p class="fw-bold mt-2 mb-0">${p.t2}</p>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('content-area').innerHTML = html;
</script>
</body>
</html>
