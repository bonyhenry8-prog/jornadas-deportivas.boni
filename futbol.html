<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol - Fases Finales CACM 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('img/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .navbar { background: rgba(0, 0, 0, 0.4); }

        /* Panel Glassmorphism */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px; 
            padding: 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
            margin: 30px auto; 
            max-width: 1000px; 
            color: white;
        }
        
        .btn-categoria { border: 2px solid white; color: white; font-weight: 700; padding: 12px 35px; margin: 0 10px; transition: 0.3s; }
        .btn-categoria.activo { background-color: #1f4e78; border-color: #1f4e78; }

        .match-card { background: rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 30px; margin: 30px auto; border: 1px solid rgba(255, 255, 255, 0.2); }
        .fecha-partido { font-weight: 900; font-size: 1.3em; color: #ffeb3b; }
        
        /* Imágenes Rectangulares */
        .team-img { 
            width: 340px; height: 200px; object-fit: cover; border-radius: 12px; 
            cursor: zoom-in; border: 3px solid white; transition: transform 0.3s;
        }
        .team-img:hover { transform: scale(1.03); }
        
        .vs-text { font-size: 2.5em; font-weight: 900; color: white; margin: 0 30px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        /* Animación Modal */
        .modal-content { background-color: transparent; border: none; }
        .modal-body { padding: 0; display: flex; justify-content: center; }
        .modal-body img { border-radius: 15px; border: 3px solid white; max-width: 95%; max-height: 90vh; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container"><a class="navbar-brand" href="index.html">⬅ VOLVER AL INICIO</a></div>
</nav>

<div class="container text-center">
    <div class="glass-panel">
        <h1 class="mb-4 fw-bold">⚽ SEMIFINALES DE FÚTBOL</h1>
        <div class="mb-4">
            <button class="btn btn-categoria" onclick="render('master')">MÁSTER</button>
            <button class="btn btn-categoria" onclick="render('senior')">SENIOR</button>
        </div>
        <div id="content-area"></div>
    </div>
</div>

<!-- Modal Animado -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-body">
                <img id="modalImage" src="" alt="Equipo">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const data = {
        master: [
            { fecha: "LUNES 22", hora: "08:00 - 10:00", t1: "GAT-S", img1: "img/gat-s.jpg", t2: "TRANSPORTES", img2: "img/transportes.jpg" },
            { fecha: "LUNES 22", hora: "10:00 - 12:00", t1: "ESCOLTA METRO.", img1: "img/escolta.jpg", t2: "NOTTINGHAN", img2: "img/nottingham.jpg" }
        ],
        senior: [
            { fecha: "LUNES 22", hora: "12:00 - 14:00", t1: "FILA 1", img1: "img/fila1.jpg", t2: "TRANSPORTE PÚB.", img2: "img/transpub.jpg" },
            { fecha: "LUNES 22", hora: "14:00 - 16:00", t1: "GAM", img1: "img/gam.jpg", t2: "GAT-S 2", img2: "img/gat-s2.jpg" }
        ]
    };

    function showImage(src) {
        document.getElementById('modalImage').src = src;
        const modal = new bootstrap.Modal(document.getElementById('imageModal'));
        modal.show();
    }

    function render(cat) {
        document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('activo'));
        event.target.classList.add('activo');
        
        let html = `<h3 class="mb-4">Categoría ${cat.toUpperCase()}</h3>`;
        data[cat].forEach(p => {
            html += `
            <div class="match-card">
                <div class="fecha-partido">${p.fecha}</div>
                <div class="mb-2">🕒 ${p.hora}</div>
                <div class="d-flex align-items-center justify-content-center">
                    <div onclick="showImage('${p.img1}')"><img src="${p.img1}" class="team-img"><p class="fw-bold mt-2">${p.t1}</p></div>
                    <div class="vs-text">VS</div>
                    <div onclick="showImage('${p.img2}')"><img src="${p.img2}" class="team-img"><p class="fw-bold mt-2">${p.t2}</p></div>
                </div>
            </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }
</script>
</body>
</html>
