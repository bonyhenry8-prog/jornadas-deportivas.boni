<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol - Fases Finales CACM 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('img/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .navbar { background: rgba(0, 0, 0, 0.4); }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px; 
            padding: 20px; 
            margin: 20px auto; 
            max-width: 1000px; 
            color: white;
        }
        
        .btn-categoria { border: 2px solid white; color: white; font-weight: 700; padding: 10px 25px; margin: 5px; transition: 0.3s; }
        .btn-categoria.activo { background-color: #1f4e78; border-color: #1f4e78; }

        .match-card { background: rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px; margin: 20px auto; }
        .fecha-partido { font-weight: 900; color: #ffeb3b; font-size: 1.2rem; }
        
        /* Ajuste responsivo de imágenes */
        .team-img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px; 
            cursor: zoom-in; 
            border: 3px solid white;
        }
        
        .vs-text { font-size: 2rem; font-weight: 900; color: white; margin: 10px 0; }

        .modal-body img { border-radius: 15px; width: 100%; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container"><a class="navbar-brand" href="index.html">⬅ VOLVER AL INICIO</a></div>
</nav>

<div class="container text-center">
    <div class="glass-panel">
        <h1 class="mb-4 fw-bold">⚽ SEMIFINALES DE FÚTBOL</h1>
        <div class="mb-4">
            <button class="btn btn-categoria" onclick="render('master')">MÁSTER</button>
            <button class="btn btn-categoria" onclick="render('senior')">SENIOR</button>
        </div>
        <div id="content-area"></div>
    </div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body"><img id="modalImage" src="" alt="Equipo"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const data = {
        master: [
            { fecha: "LUNES 22", hora: "08:00 - 10:00", t1: "GAT-S", img1: "img/gat-s.jpg", t2: "TRANSPORTES", img2: "img/transportes.jpg" },
            { fecha: "LUNES 22", hora: "10:00 - 12:00", t1: "ESCOLTA METRO.", img1: "img/escolta.jpg", t2: "NOTTINGHAN", img2: "img/nottingham.jpg" }
        ],
        senior: [
            { fecha: "LUNES 22", hora: "12:00 - 14:00", t1: "FILA 1", img1: "img/fila1.jpg", t2: "TRANSPORTE PÚB.", img2: "img/transpub.jpg" },
            { fecha: "LUNES 22", hora: "14:00 - 16:00", t1: "GAM", img1: "img/gam.jpg", t2: "GAT-S 2", img2: "img/gat-s2.jpg" }
        ]
    };

    function showImage(src) {
        document.getElementById('modalImage').src = src;
        new bootstrap.Modal(document.getElementById('imageModal')).show();
    }

    function render(cat) {
        document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('activo'));
        event.target.classList.add('activo');
        
        let html = `<h3 class="mb-4">Categoría ${cat.toUpperCase()}</h3>`;
        data[cat].forEach(p => {
            html += `
            <div class="match-card">
                <div class="fecha-partido">${p.fecha}</div>
                <div class="mb-3">🕒 ${p.hora}</div>
                <div class="row align-items-center">
                    <div class="col-5" onclick="showImage('${p.img1}')">
                        <img src="${p.img1}" class="team-img"><p class="fw-bold mt-2 mb-0">${p.t1}</p>
                    </div>
                    <div class="col-2 vs-text">VS</div>
                    <div class="col-5" onclick="showImage('${p.img2}')">
                        <img src="${p.img2}" class="team-img"><p class="fw-bold mt-2 mb-0">${p.t2}</p>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('content-area').innerHTML = html;
    }
</script>
</body>
</html>
