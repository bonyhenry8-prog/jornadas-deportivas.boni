<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecuavoley - Fases Finales CACM 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: url('img/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .navbar { background: rgba(0, 0, 0, 0.4); }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px; 
            padding: 40px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
            margin: 30px auto; 
            max-width: 1000px; 
            color: white;
        }
        
        .match-card { background: rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 30px; margin: 30px auto; border: 1px solid rgba(255, 255, 255, 0.2); }
        .fecha-partido { font-weight: 900; font-size: 1.3em; color: #8bc34a; /* Verde Ecuavoley */ }
        
        .team-img { 
            width: 340px; height: 200px; object-fit: cover; border-radius: 12px; 
            cursor: zoom-in; border: 3px solid white; transition: transform 0.3s;
        }
        .team-img:hover { transform: scale(1.03); }
        
        .vs-text { font-size: 2.5em; font-weight: 900; color: white; margin: 0 30px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        .modal-content { background-color: transparent; border: none; }
        .modal-body { padding: 0; display: flex; justify-content: center; }
        .modal-body img { border-radius: 15px; border: 3px solid white; max-width: 95%; max-height: 90vh; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container"><a class="navbar-brand" href="index.html">⬅ VOLVER AL INICIO</a></div>
</nav>

<div class="container text-center">
    <div class="glass-panel">
        <h1 class="mb-4 fw-bold">🏐 SEMIFINALES DE ECUAVOLEY</h1>
        <div id="content-area"></div>
    </div>
</div>

<!-- Modal Animado -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content"><div class="modal-body"><img id="modalImage" src="" alt="Equipo"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const partidosVoly = [
        { fecha: "MARTES 23", hora: "09:30 - 11:30", t1: "UNIDAD TIC", img1: "img/unidad_tic.jpg", t2: "LOS ALCONES", img2: "img/alcones.jpg" },
        { fecha: "MARTES 23", hora: "11:30 - 13:30", t1: "TAUROS", img1: "img/tauros.jpg", t2: "SPARTANS", img2: "img/spartans.jpg" }
    ];

    function showImage(src) {
        document.getElementById('modalImage').src = src;
        new bootstrap.Modal(document.getElementById('imageModal')).show();
    }

    let html = '';
    partidosVoly.forEach(p => {
        html += `
        <div class="match-card">
            <div class="fecha-partido">${p.fecha}</div>
            <div class="mb-3">🕒 ${p.hora}</div>
            <div class="d-flex align-items-center justify-content-center">
                <div onclick="showImage('${p.img1}')"><img src="${p.img1}" class="team-img"><p class="fw-bold mt-2">${p.t1}</p></div>
                <div class="vs-text">VS</div>
                <div onclick="showImage('${p.img2}')"><img src="${p.img2}" class="team-img"><p class="fw-bold mt-2">${p.t2}</p></div>
            </div>
        </div>`;
    });
    document.getElementById('content-area').innerHTML = html;
</script>
</body>
</html>
