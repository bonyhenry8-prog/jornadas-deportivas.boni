<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos - Jornadas Deportivas CACM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .header-galeria {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('imagenes/banner-galeria.jpg') no-repeat center center/cover;
            color: white;
            padding: 40px 0;
        }
        /* Efecto visual al pasar el mouse por encima de las fotos */
        .galeria-img {
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .galeria-img:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="imagenes/logo-institucion.png" alt="Logo" width="40" height="40" class="d-inline-block align-text-top me-2 rounded-circle bg-white">
                <span class="fs-6 fs-md-5">Jornadas Deportivas CACM</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door-fill"></i> Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="futbol.html">⚽ Fútbol</a></li>
                    <li class="nav-item"><a class="nav-link" href="basketball.html">🏀 Basketball</a></li>
                    <li class="nav-item"><a class="nav-link" href="ecuavoley.html">🏐 Ecuavoley</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="galeria.html"><i class="bi bi-images"></i> Galería</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="header-galeria text-center mb-5">
        <div class="container">
            <h1 class="fw-bold"><i class="bi bi-camera-fill text-danger"></i> Galería de Recuerdos</h1>
            <p class="lead mb-0">Los mejores momentos de las jornadas institucionales 2026</p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-4">
            
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-1.jpg" class="img-fluid galeria-img" alt="Inauguración de las Jornadas Deportivas" onclick="abrirModal(this)">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-2.jpg" class="img-fluid galeria-img" alt="Partido de Fútbol Masculino" onclick="abrirModal(this)">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-3.jpg" class="img-fluid galeria-img" alt="Encuentro de Basketball Única" onclick="abrirModal(this)">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-4.jpg" class="img-fluid galeria-img" alt="Trío de Ecuavoley en acción" onclick="abrirModal(this)">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-5.jpg" class="img-fluid galeria-img" alt="Premiación provisional" onclick="abrirModal(this)">
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100 border-0 shadow-sm overflow-hidden rounded">
                    <img src="imagenes/galeria-6.jpg" class="img-fluid galeria-img" alt="Equipo de Fútbol Femenino" onclick="abrirModal(this)">
                </div>
            </div>

        </div>
    </main>

    <div class="modal fade" id="modalVisorFotos" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark border-0">
                <div class="modal-header border-0 text-white py-2">
                    <h6 class="modal-title" id="textoPieFoto">Descripción de la foto</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-close="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0 text-center">
                    <img src="" id="imagenModalGrande" class="img-fluid w-100" alt="Vista ampliada">
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Cuerpo de Agentes de Control Metropolitano.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Inicializamos el modal usando la API de Bootstrap 5
        const modalBootstrap = new bootstrap.Modal(document.getElementById('modalVisorFotos'));
        const imgModal = document.getElementById('imagenModalGrande');
        const txtModal = document.getElementById('textoPieFoto');

        function abrirModal(elementoTarjeta) {
            // Pasamos la ruta de la imagen original y su texto descriptivo al modal
            imgModal.src = elementoTarjeta.src;
            txtModal.textContent = elementoTarjeta.alt;
            
            // Desplegamos el modal en pantalla
            modalBootstrap.show();
        }
    </script>
</body>
</html>
