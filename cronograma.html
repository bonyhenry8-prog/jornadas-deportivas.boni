<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Deportivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Jornadas Deportivas CACM</span>
        </div>
    </nav>

    <div id="contenedor-partidos" class="container mt-4">
        <div class="text-center">Cargando partidos...</div>
    </div>
    
    <script src="cronograma_datos.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contenedor = document.getElementById("contenedor-partidos");
            
            if (typeof cronogramaData !== 'undefined' && cronogramaData.encuentros) {
                contenedor.innerHTML = cronogramaData.encuentros.map(p => {
                    let color = "bg-primary";
                    if (p.disciplina === "Microfútbol") color = "bg-success";
                    if (p.disciplina === "Ecuavoley") color = "bg-warning text-dark";
                    if (p.disciplina === "Basket") color = "bg-danger";

                    return `
                    <div class="card mb-3 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge ${color} rounded-pill px-3">${p.disciplina}</span>
                                <small class="text-muted fw-bold"><i class="bi bi-clock"></i> ${p.hora}</small>
                            </div>
                            <h5 class="card-title text-center my-3">${p.equipoA} <span class="text-danger">vs</span> ${p.equipoB}</h5>
                            <div class="text-center text-muted small border-top pt-2">📅 Fecha: ${p.fecha} de 2026</div>
                        </div>
                    </div>`;
                }).join('');
            } else {
                contenedor.innerHTML = '<div class="alert alert-danger">Error: No se pudieron cargar los datos.</div>';
            }
        });
    </script>
</body>
</html>
